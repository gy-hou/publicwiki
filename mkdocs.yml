site_name: "Openresource-Wiki"
site_url: https://gy-hou.github.io/openresource-wiki/
site_author: gy-hou
site_description: "AI 工具、Prompts、Skills 开源分享 | 小红书同名博主"
repo_url: https://github.com/gy-hou/openresource-wiki
edit_uri: edit/main/docs/
use_directory_urls: true

exclude_docs: |
  _templates/**

theme:
  name: material
  language: zh
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - toc.follow
    - announce.dismiss
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    logo: material/robot-happy-outline
  # favicon: assets/images/favicon.ico  # TODO: add a real favicon

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - macros
  - search:
      separator: '[\s\u200b\-\,\.\，\。\？\！\；\：]'
  - tags
  - blog:
      blog_dir: blog
      blog_toc: true
      post_date_format: yyyy-MM-dd
      post_url_format: "{slug}"
      post_excerpt: optional
      post_excerpt_separator: <!-- more -->
      post_readtime: false
      categories: true
      categories_name: 分类
      categories_url_format: "category/{slug}"
      archive: true
      archive_name: 归档
      archive_url_format: "archive/{date}"
      archive_date_format: yyyy
      pagination: true
      pagination_per_page: 15
      authors: false
  - rss:
      match_path: "blog/posts/.*"
      use_git: false
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
      image: https://gy-hou.github.io/openresource-wiki/assets/images/og-default.png
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      type: date
      fallback_to_build_date: true
      strict: false

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gy-hou
      name: GitHub
    - icon: simple/xiaohongshu
      link: "#"
      name: 小红书
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
  generator: false

extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/deploy-hotfix.css
  - assets/stylesheets/chat.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - assets/javascripts/chat.js
  - assets/javascripts/prompt-copy-hotfix.js

copyright: Copyright &copy; 2025-2026 gy-hou | <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>

nav:
  - 首页: index.md
  - 博客:
    - blog/index.md
  - 工具库:
    - toolbox/index.md
    - Prompts:
      - prompts/index.md
      - ⭐ CC 工程化工作流: prompts/coding/claude-code-workflow.md
      - ⭐ 技术博客写作: prompts/writing/tech-blog-writer.md
      - ⭐ LLM 知识库管理: prompts/research/knowledge-base-manager.md
      - 代码审查: prompts/coding/code-review-prompt.md
      - 小红书写作: prompts/writing/xiaohongshu-writer.md
      - 论文精读: prompts/research/paper-reader.md
      - System Prompt 模板: prompts/system/ai-assistant-system.md
    - Skills:
      - skills/index.md
      - ⭐ 小红书卡片生成器: skills/templates/xhs-card-generator.md
      - ⭐ 标签自动提取: skills/templates/auto-tag-extractor.md
      - ⭐ Chrome CDP 调试: skills/templates/chrome-cdp-setup.md
      - LLM Wiki Agent: skills/templates/llm-wiki-agent.md
    - AI 平台:
      - toolbox/ai-platforms/index.md
      - 主流 AI 模型实测对比: toolbox/ai-platforms/model-comparison.md
    - 开发工具:
      - toolbox/dev-tools/index.md
      - AI 编程工具全景图: toolbox/dev-tools/ai-coding-tools.md
    - 工作流:
      - toolbox/workflows/index.md
      - 搭建个人 Wiki 的工具清单: toolbox/workflows/wiki-setup-tools.md
  - 项目:
    - projects/index.md
    - TrendR: projects/trendr.md
    - OpenClaw: projects/openclaw.md
    - Openresource-Wiki: projects/openresource-wiki.md
    - Advanced Prompts DB: projects/advanced-prompts-db.md
  - Ideas:
    - ideas/index.md
  - 关于:
    - about/index.md
    - 路线图: about/roadmap.md
  - 标签: tags.md
